<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Parking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="sidebar">
        <div>
            <h2 class="logo">
                <i class="fa-solid fa-car"></i>
                Parking
            </h2>
            <ul>
                <li><a href="/dashboard"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="/entradas"><i class="fa-solid fa-car-side"></i> Entradas</a></li>
                <li><a href="/historico"><i class="fa-solid fa-clock"></i> Histórico</a></li>
                <li><a href="/relatorios"><i class="fa-solid fa-chart-line"></i> Relatórios</a></li>
                <li><a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></li>
            </ul>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <h1>Relatórios Financeiros</h1>
                <p class="subtitulo">Desempenho do caixa do estacionamento</p>
            </div>
            <div class="relogio-box">
                <i class="fa-regular fa-clock"></i>
                <span id="relogio"></span>
            </div>
        </div>

        <div class="cards">
            <div class="card-dashboard azul w-50">
                <div>
                    <h3>Faturamento Total Acumulado</h3>
                    <p>R$ {{ "%.2f"|format(faturamento) }}</p>
                </div>
                <i class="fa-solid fa-hand-holding-dollar" style="font-size: 36px; color: #3b82f6;"></i>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
